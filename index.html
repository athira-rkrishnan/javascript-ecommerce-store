<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCart | Online Shopping Store</title>
    <link rel = "stylesheet" type = "text/css" href = "style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>
<body>
    <div class = "outer-container">
        <div class = "header-top">
            <div class = "customer-support">
                <p><i class="fa-solid fa-envelope"></i> Support@inquiry.com</p>
                <p><i class="fa-solid fa-phone"></i> +123-456-789</p>
            </div>
            <div class = "shippg-text">
                <p><i class="fa-solid fa-truck-fast"></i> Free shipping on all orders over $30</p>
                <p><i class="fa-solid fa-location-dot"></i> Track your order</p>
            </div>
        </div>
        <header class = "header">
            <div class = "nav-section">
                <div class = "logo">
                    <i class="fa-solid fa-dolly"></i>
                    NovaCart
                </div>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#news">About</a></li>
                    <li><a href="#contact">Products</a></li>
                    <li><a href="#about">Contact</a></li>
                </ul>
            </div>
            <div class = "nav-actions">
                <div class="search-box">
                    <input type="text" placeholder="Search..." class = "search-input">
                    <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                </div>
                <div class = "shoppg-cart">
                    <span class = "cartItemsCount"></span>
                    <i class="fa-solid fa-cart-shopping"></i>
                </div>
                <div class = "userPic">
                    <img src = "assets/userPic.jpg">
                </div>
            </div>
            <div class="toggle-menu">
                <i class="fa-solid fa-bars"></i>
            </div>
        </header>
        <div class="hero-bgimage">
            <div class="descrptn-text">
                <h1>Discover Trending Products</h1>
                <p>Shop Electronics, Fashion, Beauty, Furniture & More</p>
                <button>Shop Now</button>
            </div>
        </div>
    </div>
    
</body>
</html>
